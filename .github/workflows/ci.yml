name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate repo hygiene
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        shell: pwsh
        run: |
          $jsonFiles = Get-ChildItem -Recurse -Filter *.json
          foreach ($file in $jsonFiles) {
            Write-Host "Validating $($file.FullName)"
            # package-lock.json can contain empty-string property names; ConvertFrom-Json requires -AsHashtable for that.
            Get-Content $file.FullName -Raw | ConvertFrom-Json -AsHashtable | Out-Null
          }

      - name: Check for sensitive data
        shell: pwsh
        run: |
          $excludedPathPatterns = @(
            '\\.git\\',
            'tmp_openclaw\\.json',
            'tmp_openclaw\\.json\\.bak',
            'node_modules\\',
            'dist\\'
          )

          $files = Get-ChildItem -Recurse -File | Where-Object {
            $path = $_.FullName
            -not ($excludedPathPatterns | Where-Object { $path -match $_ })
          }

          $found = $false

          $secretPatterns = @(
            'sk-[a-zA-Z0-9]{20,}',
            'token"\s*:\s*"[A-Za-z0-9_-]{16,}',
            'auth"\s*:\s*\{[\s\S]{0,200}token'
          )

          foreach ($pattern in $secretPatterns) {
            $matches = $files | Select-String -Pattern $pattern
            if ($matches) {
              Write-Error "Found sensitive pattern: $pattern"
              $matches | Select-Object -First 20 | ForEach-Object {
                Write-Host ("$($_.Path):$($_.LineNumber): $($_.Line)")
              }
              $found = $true
            }
          }

          $emailCandidates = $files | Select-String -Pattern '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
          $emailMatches = $emailCandidates | Where-Object {
            $_.Line -notmatch 'example\.com|example\.org|noreply@|support@|bugs@'
          }
          if ($emailMatches) {
            Write-Error 'Found suspicious email addresses'
            $emailMatches | Select-Object -First 20 | ForEach-Object {
              Write-Host ("$($_.Path):$($_.LineNumber): $($_.Line)")
            }
            $found = $true
          }

          # Any drive letter user profile path like C:\Users\name
          $realPathCandidates = $files | Select-String -Pattern '[A-Z]:\\\\Users\\\\[^\\\\]+'
          $realPathMatches = $realPathCandidates | Where-Object {
            $_.Line -notmatch '<你>|<your-username>|<your-|YOUR_USERNAME|%USERPROFILE%|RUNNER_TEMP|example|sample'
          }
          if ($realPathMatches) {
            Write-Error 'Found suspicious Windows user paths'
            $realPathMatches | Select-Object -First 20 | ForEach-Object {
              Write-Host ("$($_.Path):$($_.LineNumber): $($_.Line)")
            }
            $found = $true
          }

          if ($found) {
            exit 1
          }

          Write-Host "✓ No sensitive data detected"

      - name: Check required files
        shell: pwsh
        run: |
          $required = @('README.md', 'LICENSE', 'CHANGELOG.md', 'CONTRIBUTING.md')
          $missing = @()
          foreach ($file in $required) {
            if (-not (Test-Path $file)) {
              $missing += $file
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required files: $($missing -join ', ')"
            exit 1
          }
          Write-Host "✓ Required documentation files present"

  build-and-smoke:
    name: Build and smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm install
        run: npm install

      - name: npm build
        run: npm run build

      - name: Test PowerShell syntax (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $scripts = Get-ChildItem -Path ./scripts -Filter *.ps1
          foreach ($script in $scripts) {
            Write-Host "Testing $($script.Name)"
            $null = [System.Management.Automation.PSParser]::Tokenize(
              (Get-Content $script.FullName -Raw),
              [ref]$null
            )
          }
          Write-Host "✓ All PowerShell scripts have valid syntax"

      - name: Create fake OpenClaw home and CLI (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/openclaw-home" "$RUNNER_TEMP/openclaw-workspace" "$RUNNER_TEMP/fake-bin"
          printf '{\n  "plugins": {\n    "entries": {}\n  }\n}\n' > "$RUNNER_TEMP/openclaw-home/openclaw.json"
          cat > "$RUNNER_TEMP/fake-bin/openclaw" <<'EOF'
          #!/usr/bin/env bash
          if [[ "${1:-}" == "--version" ]]; then
            echo "2026.3.3-ci"
            exit 0
          fi
          echo "fake openclaw ci shim"
          exit 0
          EOF
          chmod +x "$RUNNER_TEMP/fake-bin/openclaw"
          echo "OPENCLAW_HOME=$RUNNER_TEMP/openclaw-home" >> "$GITHUB_ENV"
          echo "OPENCLAW_WORKSPACE=$RUNNER_TEMP/openclaw-workspace" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/fake-bin" >> "$GITHUB_PATH"

      - name: Create fake OpenClaw home and CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $openclawHome = Join-Path $env:RUNNER_TEMP 'openclaw-home'
          $workspace = Join-Path $env:RUNNER_TEMP 'openclaw-workspace'
          $fakeBin = Join-Path $env:RUNNER_TEMP 'fake-bin'

          New-Item -ItemType Directory -Force -Path $openclawHome, $workspace, $fakeBin | Out-Null
          @"
          {
            "plugins": {
              "entries": {}
            }
          }
          "@ | Set-Content -Path (Join-Path $openclawHome 'openclaw.json') -Encoding UTF8

          $shim = Join-Path $fakeBin 'openclaw.cmd'
          @"
          @echo off
          if "%1"=="--version" (
            echo 2026.3.3-ci
            exit /b 0
          )
          echo fake openclaw ci shim
          exit /b 0
          "@ | Set-Content -Path $shim -Encoding ASCII

          "OPENCLAW_HOME=$openclawHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENCLAW_WORKSPACE=$workspace" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $fakeBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: CLI doctor smoke test (initial, expected to fail before install on Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set +e
          node ./dist/cli/index.js doctor
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Expected doctor to fail before install, but it succeeded." >&2
            exit 1
          fi
          echo "Doctor failed as expected before install (exit $status)."

      - name: CLI doctor smoke test (initial, expected to fail before install on Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          node .\dist\cli\index.js doctor
          $status = $LASTEXITCODE
          if ($status -eq 0) {
            Write-Error 'Expected doctor to fail before install, but it succeeded.'
            exit 1
          }
          Write-Host "Doctor failed as expected before install (exit $status)."
          # GitHub Actions uses the last native command's exit code; reset it so this step succeeds.
          $global:LASTEXITCODE = 0

      - name: CLI install dry-run smoke test
        run: node ./dist/cli/index.js install --dry-run

      - name: Wrapper smoke test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x scripts/*.sh

          # doctor is expected to fail before install (workspace is empty)
          set +e
          ./scripts/doctor.sh
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Expected wrapper doctor to fail before install, but it succeeded." >&2
            exit 1
          fi
          echo "Wrapper doctor failed as expected before install (exit $status)."

          ./scripts/install.sh --dry-run
          ./scripts/repair.sh --dry-run

      - name: Wrapper smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # doctor is expected to fail before install (workspace is empty)
          powershell -ExecutionPolicy Bypass -File .\scripts\doctor.ps1
          $status = $LASTEXITCODE
          if ($status -eq 0) {
            Write-Error 'Expected wrapper doctor to fail before install, but it succeeded.'
            exit 1
          }
          Write-Host "Wrapper doctor failed as expected before install (exit $status)."
          $global:LASTEXITCODE = 0

          powershell -ExecutionPolicy Bypass -File .\scripts\install.ps1 --dry-run
          powershell -ExecutionPolicy Bypass -File .\scripts\repair.ps1 --dry-run

      - name: CLI install real smoke test
        run: node ./dist/cli/index.js install

      - name: CLI doctor smoke test (after install)
        run: node ./dist/cli/index.js doctor

      - name: CLI repair dry-run smoke test
        run: node ./dist/cli/index.js repair --dry-run

      - name: CLI repair real smoke test
        run: node ./dist/cli/index.js repair

      - name: CLI uninstall smoke test
        run: node ./dist/cli/index.js uninstall

      - name: CLI doctor smoke test (after uninstall)
        run: node ./dist/cli/index.js doctor

      - name: Reinstall before remove-files smoke test
        run: node ./dist/cli/index.js install

      - name: CLI uninstall remove-files smoke test
        run: node ./dist/cli/index.js uninstall --remove-files

      - name: CLI doctor smoke test (expected failure after remove-files on Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set +e
          node ./dist/cli/index.js doctor
          status=$?
          if [ "$status" -eq 0 ]; then
            echo "Expected doctor to fail after remove-files, but it succeeded." >&2
            exit 1
          fi
          echo "Doctor failed as expected after remove-files (exit $status)."

      - name: CLI doctor smoke test (expected failure after remove-files on Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          node .\dist\cli\index.js doctor
          $status = $LASTEXITCODE
          if ($status -eq 0) {
            Write-Error 'Expected doctor to fail after remove-files, but it succeeded.'
            exit 1
          }
          Write-Host "Doctor failed as expected after remove-files (exit $status)."
          $global:LASTEXITCODE = 0
